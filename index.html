<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum V2 Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">QUANTUM<span>V2</span></div>
        <div id="connection-status" class="status-online">SYSTEM READY</div>
    </header>

    <main id="app-container">
        <section id="tab-hub" class="tab-content active">
            <h2>The Vermeer Filter</h2>
            <div id="vermeer-alerts"></div>
        </section>

        <section id="tab-monte" class="tab-content">
            <h2>Monte Carlo POW</h2>
            <div class="stat-card">
                <p>Simulating 10,000 Game Iterations...</p>
                <div id="monte-results"></div>
            </div>
        </section>

        <section id="tab-poisson" class="tab-content">
            <h2>Poisson & Roster POW</h2>
            <div class="card">
                <h3>Roster Impact Analysis</h3>
                <div id="roster-report"></div>
            </div>
            <h4>Score Probability Matrix</h4>
            <div id="poisson-grid" class="score-grid"></div>
        </section>

        <section id="tab-odds" class="tab-content">
            <h2>Market Edge Analysis</h2>
            <div id="odds-list"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('tab-hub')">HUB</button>
        <button class="nav-item" onclick="switchTab('tab-monte')">MONTE</button>
        <button class="nav-item" onclick="switchTab('tab-poisson')">POISSON</button>
        <button class="nav-item" onclick="switchTab('tab-odds')">ODDS</button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
