<!DOCTYPE html>
<html lang="en">
<head>

    <title>Quantum V2 Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="status-bar">
            <span>SYSTEM: <span id="connection-status" class="text-green">ONLINE</span></span>
            <span id="current-date"></span>
        </div>
        <h1>QUANTUM<span>V2</span></h1>

    <main id="app-content">
        <div id="vermeer-alerts" class="tab-content active">
            <div class="loading">SYNCING TRIANGULATION DATA...</div>
        </div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('hub')">HUB</button>
        <button class="nav-item" onclick="switchTab('poisson')">POISSON</button>
        <button class="nav-item" onclick="switchTab('roster')">ROSTER</button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
